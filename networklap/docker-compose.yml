services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:latest
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
    restart: always

  website:
    image: nginx
    environment:
      - VIRTUAL_HOST=website.lab
      - VIRTUAL_PORT=80
    restart: always

  pihole:
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8082:80"
    environment:
      - WEBPASSWORD=changeme
      - VIRTUAL_HOST=pihole.lab
      - VIRTUAL_PORT=80
    volumes:
      - pihole_data:/etc/pihole
    restart: always

  nextcloud:
    image: nextcloud:latest
    environment:
      - VIRTUAL_HOST=nextcloud.lab
      - VIRTUAL_PORT=80
    volumes:
      - nextcloud_data:/var/www/html
    restart: always

  netdata:
    image: netdata/netdata:latest
    ports:
      - "19999:19999"
    environment:
      - VIRTUAL_HOST=netdata.lab
      - VIRTUAL_PORT=19999
    cap_add:
      - SYS_PTRACE
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    restart: always

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: always

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    volumes:
      - uptime_data:/app/data
    restart: always

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Skopje
      - SERVERURL=auto
      - SERVERPORT=51820
      - PEERS=5
      - PEERDNS=192.168.1.50
      - INTERNAL_SUBNET=10.13.13.0
    volumes:
      - wireguard_data:/config
      - /lib/modules:/lib/modules
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: always

volumes:
  pihole_data:
  nextcloud_data:
  portainer_data:
  uptime_data:
  wireguard_data:
